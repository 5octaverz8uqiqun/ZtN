name: far

on:
  push:

jobs:
  primitive:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        missile: ["bulb", "gardener", "curious", "dear", "agriculture"]
        critical: ["fussy", "sour", "dependent", "improve"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar nh.jar
